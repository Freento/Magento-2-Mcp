<!-- New client message -->
<div data-bind="visible: isNewClient()" class="admin__field">
    <label class="admin__field-label"></label>
    <div class="admin__field-control">
        <span class="admin__field-note" data-bind="i18n: 'Save the client first to see credentials.'"></span>
    </div>
</div>

<!-- Existing client credentials -->
<div data-bind="visible: !isNewClient()">
    <!-- Client ID -->
    <div class="admin__field">
        <label class="admin__field-label">
            <span data-bind="i18n: 'Client ID'"></span>
        </label>
        <div class="admin__field-control">
            <div style="display: flex; align-items: center; gap: 10px;">
                <input type="text"
                       class="admin__control-text"
                       readonly
                       data-bind="value: clientId"
                       style="max-width: 400px; font-family: monospace;">
                <button type="button"
                        class="action-secondary"
                        data-bind="click: copyClientId">
                    <span data-bind="i18n: 'Copy'"></span>
                </button>
            </div>
            <div class="admin__field-note">
                <span data-bind="i18n: 'Auto-generated. Used by the client to identify itself.'"></span>
            </div>
        </div>
    </div>

    <!-- Client Secret -->
    <div class="admin__field">
        <label class="admin__field-label">
            <span data-bind="i18n: 'Client Secret'"></span>
        </label>
        <div class="admin__field-control">
            <button type="button"
                    class="action-secondary"
                    data-bind="click: copySecret">
                <span data-bind="i18n: 'Copy Secret to Clipboard'"></span>
            </button>
            <div class="admin__field-note">
                <span data-bind="i18n: 'Secret is stored encrypted. Click to copy.'"></span>
            </div>
        </div>
    </div>

    <!-- Created At -->
    <div class="admin__field">
        <label class="admin__field-label">
            <span data-bind="i18n: 'Created At'"></span>
        </label>
        <div class="admin__field-control">
            <span data-bind="text: createdAt"></span>
        </div>
    </div>
</div>
